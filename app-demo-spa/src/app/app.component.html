<header class="shell-header">
  <div class="shell-header__brand">
    <span class="shell-header__logo" aria-hidden="true">&#9632;</span>
    <span class="shell-header__title">Corp PoC — Demo App</span>
  </div>

  <nav class="shell-header__nav" aria-label="Navegación principal">
    <a routerLink="/items" routerLinkActive="active" *ngIf="isLoggedIn">
      Artículos
    </a>
    <a routerLink="/orders" routerLinkActive="active" *ngIf="isLoggedIn">
      Órdenes
    </a>
    <a [href]="landingUrl" target="_blank" rel="noopener noreferrer">
      Landing
    </a>
  </nav>

  <div class="shell-header__user" *ngIf="isLoggedIn">
    <span class="shell-header__username" title="Usuario autenticado">{{ userName }}</span>
  </div>

  <div class="shell-header__actions">
    <button *ngIf="!isLoggedIn" class="btn btn--primary" (click)="login()">
      Iniciar sesión
    </button>
    <button *ngIf="isLoggedIn" class="btn btn--secondary" (click)="logout()">
      Cerrar sesión
    </button>
  </div>
</header>

<main class="shell-content">
  <router-outlet />
</main>
