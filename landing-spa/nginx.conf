# nginx.conf — plantilla para Cloud Run.
# El Dockerfile ejecuta `envsubst` para reemplazar ${PORT} antes de iniciar nginx.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logs en formato JSON (compatible con Cloud Logging)
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes_sent":$bytes_sent,'
            '"referrer":"$http_referer",'
            '"user_agent":"$http_user_agent",'
            '"request_time":$request_time'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    sendfile        on;
    keepalive_timeout 65;

    # Compresión
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    server {
        listen ${PORT};
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Seguridad — cabeceras HTTP
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://login.microsoftonline.com https://*.microsoftonline.com;"
            always;

        # SPA — redirige todas las rutas al index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Assets con hashing de Angular — cache largo
        location ~* \.(js|css|woff2?|ttf|otf|eot|svg|png|jpg|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # index.html — sin cache para forzar revisión de nueva versión
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        # Health check para Cloud Run
        location = /healthz {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }
    }
}
