<header class="shell-header">
  <div class="shell-header__brand">
    <span class="shell-header__logo" aria-hidden="true">&#9632;</span>
    <span class="shell-header__title">Corp PoC Cloud Run</span>
  </div>

  <!-- Menú dinámico: opciones vienen de Cloud SQL (via BFF + handshake de sesión) -->
  <nav class="shell-header__nav" aria-label="Navegación principal">
    <ng-container *ngIf="menuItems.length > 0; else staticNav">
      <a
        *ngFor="let item of menuItems"
        [routerLink]="item.route"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: item.route === '/' }">
        {{ item.label }}
      </a>
    </ng-container>

    <!-- Menú estático de fallback (antes del login / si falla el handshake) -->
    <ng-template #staticNav>
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Inicio</a>
      <a routerLink="/profile" routerLinkActive="active" *ngIf="isLoggedIn">Perfil</a>
    </ng-template>
  </nav>

  <div class="shell-header__user" *ngIf="isLoggedIn && userName">
    <span class="shell-header__username" title="Usuario autenticado">{{ userName }}</span>
  </div>

  <div class="shell-header__actions">
    <button *ngIf="!isLoggedIn" class="btn btn--primary" (click)="login()">
      Iniciar sesión
    </button>
    <button *ngIf="isLoggedIn" class="btn btn--secondary" (click)="logout()">
      Cerrar sesión
    </button>
  </div>
</header>

<main class="shell-content">
  <router-outlet />
</main>
